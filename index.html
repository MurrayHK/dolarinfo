<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor Dólar Bancos AR</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4 md:p-8">
    <div class="max-w-4xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-black text-slate-800 tracking-tight">LALA Monitor de Bancos</h1>
            <p id="status-text" class="text-blue-600 text-xs font-bold mt-2 uppercase tracking-widest">Sincronizando con CriptoYa...</p>
        </header>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4 mb-8">
            <div class="bg-white border-l-4 border-emerald-500 p-5 rounded-xl shadow-sm">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Mejor para VENDER (Te pagan más)</span>
                <div id="best-buy-price" class="text-3xl font-black text-emerald-600">--</div>
                <div id="best-buy-bank" class="text-sm text-slate-500 font-medium capitalize">--</div>
            </div>
            <div class="bg-white border-l-4 border-indigo-500 p-5 rounded-xl shadow-sm">
                <span class="text-[10px] font-bold text-slate-400 uppercase">Mejor para COMPRAR (Pagás menos)</span>
                <div id="best-sell-price" class="text-3xl font-black text-indigo-600">--</div>
                <div id="best-sell-bank" class="text-sm text-slate-500 font-medium capitalize">--</div>
            </div>
        </div>

        <div class="bg-white rounded-2xl shadow-xl border border-slate-200 overflow-hidden">
            <table class="w-full">
                <thead class="bg-slate-50 border-b border-slate-200 text-left">
                    <tr>
                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase">Banco / Entidad</th>
                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase text-center">Compra</th>
                        <th class="p-4 text-[10px] font-bold text-slate-400 uppercase text-center">Venta</th>
                    </tr>
                </thead>
                <tbody id="data-table" class="divide-y divide-slate-100">
                    </tbody>
            </table>
        </div>
    </div>

    <script>
        const API_URL = 'https://criptoya.com/api/bancos/usd';

        async function updateQuotes() {
            const status = document.getElementById('status-text');
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("Error de respuesta");
                
                const data = await response.json();
                
                // Convertimos el objeto en un array procesable
                const banksArray = Object.keys(data).map(key => ({
                    id: key,
                    compra: data[key].bid,
                    venta: data[key].ask,
                    actualizado: data[key].time
                })).filter(b => b.compra > 0); // Filtramos entidades sin precio

                renderUI(banksArray);
                status.innerText = `Última actualización: ${new Date().toLocaleTimeString()}`;

            } catch (err) {
                console.error("Error en fetch:", err);
                status.innerText = "Error de conexión. Reintentando...";
            }
        }

        function renderUI(banks) {
            const tableBody = document.getElementById('data-table');
            tableBody.innerHTML = '';

            // Ordenar alfabéticamente
            banks.sort((a, b) => a.id.localeCompare(b.id));

            banks.forEach(bank => {
                const tr = document.createElement('tr');
                tr.className = "hover:bg-slate-50 transition-colors";
                tr.innerHTML = `
                    <td class="p-4 font-bold text-slate-700 capitalize">${bank.id.replace(/_/g, ' ')}</td>
                    <td class="p-4 text-center font-mono text-emerald-600 font-bold">$${bank.compra.toLocaleString('es-AR')}</td>
                    <td class="p-4 text-center font-mono text-indigo-600 font-bold">$${bank.venta.toLocaleString('es-AR')}</td>
                `;
                tableBody.appendChild(tr);
            });

            // Lógica de "Mejores Precios"
            const bestBuy = [...banks].sort((a, b) => b.compra - a.compra)[0];
            const bestSell = [...banks].sort((a, b) => a.venta - b.venta)[0];

            if (bestBuy) {
                document.getElementById('best-buy-price').innerText = `$${bestBuy.compra.toLocaleString('es-AR')}`;
                document.getElementById('best-buy-bank').innerText = bestBuy.id.replace(/_/g, ' ');
            }
            if (bestSell) {
                document.getElementById('best-sell-price').innerText = `$${bestSell.venta.toLocaleString('es-AR')}`;
                document.getElementById('best-sell-bank').innerText = bestSell.id.replace(/_/g, ' ');
            }
        }

        // Ejecución
        updateQuotes();
        setInterval(updateQuotes, 60000);
    </script>
</body>
</html>
