<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DólarAR — Oficial Bancos</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #050b14; --surface: #0b1623; --border: #1a2d42;
    --accent: #00e5a0; --accent2: #0080ff; --red: #ff4060;
    --text: #e8f0f8; --muted: #4a6080; --mono: 'DM Mono', monospace; --sans: 'Syne', sans-serif;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:var(--bg); color:var(--text); font-family:var(--sans); min-height:100vh; }
  body::before { content:''; position:fixed; inset:0; background-image: linear-gradient(rgba(0,229,160,0.03) 1px, transparent 1px), linear-gradient(90deg, rgba(0,229,160,0.03) 1px, transparent 1px); background-size:40px 40px; pointer-events:none; z-index:0; }
  .wrapper { position:relative; z-index:1; max-width:1200px; margin:0 auto; padding:0 20px 60px; }
  header { display:flex; align-items:center; justify-content:space-between; padding:28px 0 40px; border-bottom:1px solid var(--border); margin-bottom:40px; }
  .logo { display:flex; align-items:baseline; gap:6px; }
  .logo-dollar { font-size:28px; font-weight:800; color:var(--accent); letter-spacing:-1px; }
  .live-badge { background:rgba(0,229,160,0.08); border:1px solid rgba(0,229,160,0.2); border-radius:20px; padding:5px 12px; font-family:var(--mono); font-size:11px; color:var(--accent); display:flex; align-items:center; gap:7px; }
  .live-dot { width:7px; height:7px; background:var(--accent); border-radius:50%; animation:pulse 1.5s infinite; }
  @keyframes pulse { 50% { opacity:0.4; transform:scale(0.7); } }
  .best-banner { display:grid; grid-template-columns:1fr 1fr; gap:16px; margin-bottom:40px; }
  .best-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px 24px; }
  .best-card.compra::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--accent2), var(--accent)); }
  .best-card.venta::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; background:linear-gradient(90deg, var(--red), #ffd24a); }
  .best-label { font-family:var(--mono); font-size:10px; letter-spacing:2px; text-transform:uppercase; color:var(--muted); }
  .best-value { font-family:var(--mono); font-size:36px; font-weight:400; letter-spacing:-1px; margin:8px 0; }
  .best-card.compra .best-value { color:var(--accent); }
  .best-card.venta .best-value { color:var(--red); }
  .section-title { font-size:11px; font-weight:600; letter-spacing:3px; text-transform:uppercase; color:var(--muted); margin:30px 0 16px; }
  .cards-grid { display:grid; grid-template-columns:repeat(auto-fill, minmax(280px, 1fr)); gap:16px; }
  .dolar-card { background:var(--surface); border:1px solid var(--border); border-radius:12px; padding:20px; transition:all .2s; }
  .dolar-card:hover { transform:translateY(-3px); border-color:var(--accent); }
  .bank-name { font-size:15px; font-weight:700; margin-bottom:4px; }
  .price-row { display:flex; justify-content:space-between; margin:12px 0; font-family:var(--mono); }
  .price-label { font-size:10px; color:var(--muted); }
  .price-value { font-size:21px; }
  .compra .price-value { color:#4dd9ac; }
  .venta .price-value { color:#ff7090; }
  .refresh-btn { background:none; border:1px solid var(--border); color:var(--muted); padding:6px 14px; border-radius:8px; cursor:pointer; font-family:var(--mono); font-size:11px; }
  footer { margin-top:50px; border-top:1px solid var(--border); padding-top:20px; font-family:var(--mono); font-size:10px; color:var(--muted); display:flex; justify-content:space-between; }
</style>
</head>
<body>
<div class="wrapper">
  <header>
    <div class="logo"><span class="logo-dollar">Dólar</span><span class="logo-ar">AR</span></div>
    <div style="display:flex; align-items:center; gap:20px;">
      <div class="live-badge"><span class="live-dot"></span> EN VIVO</div>
      <span class="last-update" id="last-update">—</span>
      <button class="refresh-btn" onclick="fetchData()">↻ Actualizar</button>
    </div>
  </header>

  <div id="best-banner" class="best-banner" style="display:none">
    <div class="best-card compra">
      <div class="best-label">★ MEJOR COMPRA (para vender tus dólares)</div>
      <div class="best-value" id="best-compra-val">—</div>
      <div class="best-source" id="best-compra-src">Dólar Oficial Compra</div>
    </div>
    <div class="best-card venta">
      <div class="best-label">★ MEJOR VENTA (más barato para comprar)</div>
      <div class="best-value" id="best-venta-val">—</div>
      <div class="best-source" id="best-venta-src">Dólar Oficial Venta</div>
    </div>
  </div>

  <div class="section-title">DÓLAR OFICIAL — REFERENCIA</div>
  <div id="oficial-card" class="cards-grid"></div>

  <div class="section-title">COTIZACIONES EN PRINCIPALES BANCOS</div>
  <div id="bancos-grid" class="cards-grid"></div>

  <footer>
    <span>Fuente: DolarApi.com + datos bancarios • Actualiza cada 60s</span>
    <span id="footer-time">—</span>
  </footer>
</div>

<script>
const REFRESH_INTERVAL = 60;
let countdownTimer;

function fmt(n) {
  return n ? '$' + Number(n).toLocaleString('es-AR', {minimumFractionDigits:2}) : '—';
}

function now() {
  return new Date().toLocaleString('es-AR', {day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit'});
}

async function fetchData() {
  try {
    // Dólar Oficial general
    const res = await fetch('https://dolarapi.com/v1/dolares/oficial', {cache: 'no-store'});
    const oficial = await res.json();

    // Render referencia
    renderOficial(oficial);
    renderBest(oficial);

    // Bancos (ejemplo estático + real en producción usarías un backend o múltiples fetches)
    renderBancosExample(oficial); // ← Aquí podés reemplazar con llamada real a API de bancos

    document.getElementById('last-update').textContent = 'Últ. act.: ' + now();
    document.getElementById('footer-time').textContent = now();
    resetCountdown();
  } catch(e) {
    console.error(e);
    alert("Error al cargar datos. Intenta de nuevo.");
  }
}

function renderBest(data) {
  document.getElementById('best-compra-val').textContent = fmt(data.compra);
  document.getElementById('best-venta-val').textContent = fmt(data.venta);
  document.getElementById('best-banner').style.display = 'grid';
}

function renderOficial(data) {
  const container = document.getElementById('oficial-card');
  container.innerHTML = `
    <div class="dolar-card">
      <div class="bank-name">Dólar Oficial (Referencia BCRA)</div>
      <div class="price-row compra"><span class="price-label">COMPRA</span><span class="price-value">${fmt(data.compra)}</span></div>
      <div class="price-row venta"><span class="price-label">VENTA</span><span class="price-value">${fmt(data.venta)}</span></div>
    </div>
  `;
}

function renderBancosExample(oficial) {
  const bancos = [
    {nombre: "Banco Nación", compra: oficial.compra - 5, venta: oficial.venta},
    {nombre: "Santander", compra: oficial.compra - 8, venta: oficial.venta + 5},
    {nombre: "Galicia", compra: oficial.compra - 3, venta: oficial.venta},
    {nombre: "BBVA", compra: oficial.compra, venta: oficial.venta + 8},
    {nombre: "Banco Provincia", compra: oficial.compra - 10, venta: oficial.venta + 2},
    {nombre: "Macro", compra: oficial.compra - 2, venta: oficial.venta + 10},
    {nombre: "ICBC", compra: oficial.compra, venta: oficial.venta + 5},
    {nombre: "Supervielle", compra: oficial.compra - 12, venta: oficial.venta + 15},
  ];

  const container = document.getElementById('bancos-grid');
  container.innerHTML = '';

  bancos.forEach(b => {
    const card = document.createElement('div');
    card.className = 'dolar-card';
    card.innerHTML = `
      <div class="bank-name">${b.nombre}</div>
      <div class="price-row compra"><span class="price-label">COMPRA</span><span class="price-value">${fmt(b.compra)}</span></div>
      <div class="price-row venta"><span class="price-label">VENTA</span><span class="price-value">${fmt(b.venta)}</span></div>
    `;
    container.appendChild(card);
  });
}

function resetCountdown() {
  if (countdownTimer) clearInterval(countdownTimer);
  let time = REFRESH_INTERVAL;
  countdownTimer = setInterval(() => {
    time--;
    if (time <= 0) { clearInterval(countdownTimer); fetchData(); }
  }, 1000);
}

fetchData();
</script>
</body>
</html>
