<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dólar Hoy - Bancos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    body { font-family: system-ui, sans-serif; }
    .price { font-size: 2.9rem; font-weight: 800; letter-spacing: -2px; }
  </style>
</head>
<body class="bg-gray-950 text-white min-h-screen">
  <div class="max-w-5xl mx-auto p-6">
    <h1 class="text-4xl font-bold text-center mb-2">💵 Dólar Hoy en Bancos</h1>
    <p class="text-center text-gray-400 mb-2">Solo los bancos que pediste</p>

    <div class="flex justify-center items-center gap-4 mb-8 text-sm">
      <span id="status" class="text-emerald-400 flex items-center gap-2">
        <i class="fas fa-circle animate-pulse"></i> Actualizando...
      </span>
      <span id="countdown" class="text-gray-400"></span>
      <button onclick="toggleAutoUpdate()" id="btn-auto"
              class="text-xs px-3 py-1 bg-gray-800 hover:bg-gray-700 rounded-full transition">
        Auto: ON
      </button>
    </div>

    <!-- MEJOR COTIZACIÓN -->
    <div id="mejor" class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10"></div>

    <!-- TABLA -->
    <div class="bg-gray-900 rounded-3xl shadow-2xl overflow-hidden">
      <div class="flex justify-between items-center px-6 py-5 border-b border-gray-800">
        <h2 class="text-2xl font-semibold">Bancos seleccionados</h2>
        <button onclick="cargarDatos()" 
                class="bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-2xl flex items-center gap-3 transition-all">
          <i class="fas fa-sync"></i> Actualizar ahora
        </button>
      </div>
      <table class="w-full" id="tabla">
        <thead class="bg-gray-800">
          <tr>
            <th class="px-6 py-4 text-left">Banco</th>
            <th class="px-6 py-4 text-center">Compra</th>
            <th class="px-6 py-4 text-center">Venta</th>
            <th class="px-6 py-4 text-center">Actualizado</th>
          </tr>
        </thead>
        <tbody class="text-gray-300 divide-y divide-gray-800" id="tabla-body"></tbody>
      </table>
    </div>

    <p class="text-center text-xs text-gray-500 mt-8">
      Fuente: <a href="https://www.infodolar.com/" target="_blank" class="hover:underline">infodolar.com</a><br>
      Última actualización: <span id="ultima-actualizacion"></span>
    </p>
  </div>

  <script>
    const bancosDeseados = new Set([
      "Banco Santa Fe", "Banco Hipotecario", "BBVA Banco Francés",
      "Banco Provincia", "Banco Nación", "Banco Supervielle",
      "Banco de Córdoba", "ICBC", "Banco Entre Ríos"
    ]);

    let autoInterval = null;
    let countdownInterval = null;
    let timeLeft = 300; // 5 minutos en segundos

    async function cargarDatos() {
      const proxy = "https://api.codetabs.com/v1/proxy?quest=";
      const url = "https://www.infodolar.com/";

      document.getElementById("status").innerHTML = `<i class="fas fa-spinner fa-spin"></i> Cargando...`;

      try {
        const res = await fetch(proxy + encodeURIComponent(url));
        if (!res.ok) throw new Error("Error de red");

        const html = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(html, "text/html");

        let tabla = null;
        const tablas = doc.querySelectorAll("table");
        for (let t of tablas) {
          if (t.textContent.includes("Banco Santa Fe") && t.textContent.includes("Compra")) {
            tabla = t;
            break;
          }
        }

        if (!tabla) throw new Error("Tabla no encontrada");

        const filas = tabla.querySelectorAll("tr");
        let datos = [];

        filas.forEach(fila => {
          const celdas = Array.from(fila.querySelectorAll("td"));
          if (celdas.length < 3) return;

          let banco = celdas[0].textContent.trim()
            .replace(/ADVERTISEMENT.*/i, "")
            .replace(/\s+/g, " ")
            .trim();

          if (!bancosDeseados.has(banco)) return;

          const compra = (celdas[1]?.textContent.trim() || "").split("=")[0].trim();
          const venta = (celdas[2]?.textContent.trim() || "").split("=")[0].trim();
          const hora = "—";

          datos.push({ banco, compra, venta, hora });
        });

        // Render tabla
        const tbody = document.getElementById("tabla-body");
        tbody.innerHTML = "";
        datos.forEach(d => {
          tbody.innerHTML += `
            <tr class="hover:bg-gray-800/70 transition-colors">
              <td class="px-6 py-4 font-medium">${d.banco}</td>
              <td class="px-6 py-4 text-center text-emerald-400 font-semibold">${d.compra}</td>
              <td class="px-6 py-4 text-center text-rose-400 font-semibold">${d.venta}</td>
              <td class="px-6 py-4 text-center text-gray-400 text-sm">${d.hora}</td>
            </tr>
          `;
        });

        // Mejor cotización
        if (datos.length > 0) {
          const mejorCompra = [...datos].sort((a,b) => parsePrecio(a.venta) - parsePrecio(b.venta))[0];
          const mejorVenta = [...datos].sort((a,b) => parsePrecio(b.compra) - parsePrecio(a.compra))[0];

          document.getElementById("mejor").innerHTML = `
            <div class="bg-emerald-900/70 border border-emerald-700 rounded-3xl p-8 text-center">
              <p class="text-emerald-400 uppercase text-sm tracking-widest">Mejor para COMPRAR</p>
              <p class="text-xl mt-3">${mejorCompra.banco}</p>
              <p class="price text-emerald-400">${mejorCompra.venta}</p>
            </div>
            <div class="bg-amber-900/70 border border-amber-700 rounded-3xl p-8 text-center">
              <p class="text-amber-400 uppercase text-sm tracking-widest">Mejor para VENDER</p>
              <p class="text-xl mt-3">${mejorVenta.banco}</p>
              <p class="price text-amber-400">${mejorVenta.compra}</p>
            </div>
          `;
        }

        document.getElementById("ultima-actualizacion").textContent = 
          new Date().toLocaleTimeString('es-AR');

        document.getElementById("status").innerHTML = `<i class="fas fa-check"></i> Actualizado`;

      } catch (err) {
        console.error(err);
        document.getElementById("status").innerHTML = `<i class="fas fa-exclamation-triangle text-yellow-400"></i> Error`;
      }

      resetCountdown();
    }

    function parsePrecio(str) {
      return parseFloat(str.replace(/[^0-9,]/g, "").replace(",", ".")) || 999999;
    }

    function startAutoUpdate() {
      if (autoInterval) clearInterval(autoInterval);
      autoInterval = setInterval(cargarDatos, 300000); // 5 minutos
    }

    function resetCountdown() {
      if (countdownInterval) clearInterval(countdownInterval);
      timeLeft = 300;
      updateCountdownDisplay();

      countdownInterval = setInterval(() => {
        timeLeft--;
        updateCountdownDisplay();
        if (timeLeft <= 0) timeLeft = 300;
      }, 1000);
    }

    function updateCountdownDisplay() {
      const minutes = Math.floor(timeLeft / 60);
      const seconds = timeLeft % 60;
      document.getElementById("countdown").textContent = 
        `Próxima actualización en ${minutes}:${seconds.toString().padStart(2, '0')}`;
    }

    function toggleAutoUpdate() {
      const btn = document.getElementById("btn-auto");
      if (autoInterval) {
        clearInterval(autoInterval);
        autoInterval = null;
        btn.textContent = "Auto: OFF";
        btn.classList.add("line-through");
      } else {
        startAutoUpdate();
        btn.textContent = "Auto: ON";
        btn.classList.remove("line-through");
      }
    }

    // Iniciar todo
    window.onload = () => {
      cargarDatos();
      startAutoUpdate();
    };
  </script>
</body>
</html>
